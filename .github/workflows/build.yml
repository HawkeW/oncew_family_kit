name: Build and Export

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm nuxt build --preset node-server
        env:
          NUXT_DEVTOOLS: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oncew-family-kit-output
          path: .output/
          retention-days: 1
